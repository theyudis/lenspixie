<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LensPixie | Client Portal - Naura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between relative overflow-x-hidden">

    <div class="absolute top-0 right-0 w-[350px] h-[350px] bg-emerald-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-rose-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <header class="w-full max-w-4xl mx-auto px-6 py-6 flex justify-between items-center z-10">
        <span class="font-mono font-bold text-xs tracking-widest text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1 rounded-full">
            &lt;LensPixie /&gt;
        </span>
        <span class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Collaborator Space</span>
    </header>

    <main class="w-full max-w-md mx-auto px-4 py-4 z-10 flex-grow flex items-center justify-center">
        <div class="w-full bg-slate-900/50 border border-slate-800/80 backdrop-blur-md rounded-2xl overflow-hidden shadow-2xl">
            
            <div class="h-56 w-full overflow-hidden relative group bg-slate-800">
                <img src="../images/portrait-1.jpg" alt="Naura Best Shot" class="w-full h-full object-cover object-center grayscale hover:grayscale-0 transition duration-500">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/20 to-transparent"></div>
                <span class="absolute bottom-3 left-4 bg-rose-500/80 text-white font-mono text-[9px] font-bold tracking-widest px-2 py-0.5 rounded uppercase">
                    Preview Shot
                </span>
            </div>

            <div class="p-6 text-center">
                <h1 class="text-xl font-bold tracking-tight text-slate-100">Halo, Naura!</h1>
                <p class="mt-2 text-xs text-slate-400 leading-relaxed">
                    Terima kasih banyak atas kolaborasi luar biasa di sesi <span class="text-emerald-400">Jakarta Street Portrait</span>. Senang bisa mengabadikan karakter dan ekspresimu lewat lensa.
                </p>

                <div class="mt-6 space-y-3">
                    <a href="https://drive.google.com/drive/folders/1coZEeNYzPZ0RavrvGJjrg0deRfpS-9xS?usp=drive_link" target="_blank"
                       class="inline-flex items-center justify-center gap-2 w-full px-4 py-3 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-xs rounded-xl transition duration-300 shadow-lg shadow-emerald-500/20">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                        <span>Lihat Semua Foto (Google Drive)</span>
                    </a>
                </div>
            </div>

        </div>
    </main>

    <footer class="w-full max-w-4xl mx-auto px-6 py-4 text-center text-[10px] font-mono text-slate-600 tracking-wide z-10">
        &copy; 2026 LensPixie. Crafted with Code & Glass.
    </footer>

</body>
</html>
